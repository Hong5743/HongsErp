server.port=8080

spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.url=jdbc:log4jdbc:mysql://localhost:3306/hongs-erp?serverTimezone=UTC&characterEncoding=UTF-8

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.messages.basename=message
spring.messages.encoding=UTF-8

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# MyBatis 설정
mybatis.mapper-locations=mapper/**/*.xml

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800

# Auth
auth.allowed-domains=hongs.com
auth.initial-admin-password=${INITIAL_ADMIN_PASSWORD}
auth.max-fail-count=5

# Redis (local default, 프로덕션은 application-prod.properties)
spring.data.redis.host=localhost
spring.data.redis.port=6379