spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

mybatis.mapper-locations=mapper/**/*.xml

# Flyway 비활성화 (테스트는 JPA DDL 사용)
spring.flyway.enabled=false

# JWT (테스트용 고정 시크릿)
jwt.secret=test-secret-key-for-unit-tests-minimum-256-bits-long-12345678
jwt.access-token-expiry-seconds=900
jwt.refresh-token-expiry-seconds=604800

# Auth
auth.allowed-domains=hongs.com
auth.initial-admin-password=Admin1234!
auth.max-fail-count=5

# 테스트에서 StoragePort는 @MockitoBean으로 대체
posheet.storage.access-key=test
posheet.storage.secret-key=test
posheet.storage.region=us-east-1
